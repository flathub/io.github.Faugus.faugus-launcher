app-id: io.github.Faugus.faugus-launcher
sdk: org.gnome.Sdk
runtime: org.gnome.Platform
runtime-version: &runtime-version '50'
x-gl-version: &gl-version '1.4'
x-gl-versions: &gl-versions 25.08;25.08extra;1.4
x-gl-merge-dirs: &gl-merge-dirs vulkan/icd.d;glvnd/egl_vendor.d;egl/egl_external_platform.d;OpenCL/vendors;lib/dri;lib/d3d;lib/gbm;vulkan/explicit_layer.d;vulkan/implicit_layer.d
command: faugus-launcher
separate-locales: false # translations
base: org.winehq.Wine
base-version: stable-25.08

finish-args:
  - --share=network
  - --share=ipc
  - --socket=wayland
  - --socket=x11
  - --socket=pulseaudio # notification sound
  - --allow=devel # ubisoft connect and other launchers
  - --allow=bluetooth
  - --allow=multiarch
  - --allow=per-app-dev-shm  # pressure-vessel
  - --device=all
  - --talk-name=org.kde.StatusNotifierWatcher # system tray
  - --own-name=com.steampowered.* # run multiple games in the same prefix
  - --env=PATH=/app/bin:/app/utils/bin:/usr/bin:/usr/lib/extensions/vulkan/MangoHud/bin:/usr/lib/extensions/vulkan/gamescope/bin:/usr/lib/extensions/vulkan/OBSVkCapture/bin # mangohud, gamescope, obsvkcapture
  - --filesystem=home
  - --filesystem=/mnt
  - --filesystem=/run/media
  - --filesystem=xdg-config/MangoHud:ro

inherit-extensions:
  - org.freedesktop.Platform.GL32
  - org.freedesktop.Platform.Compat.i386

add-extensions:
  org.freedesktop.Platform.VAAPI.Intel.i386:
    directory: lib/i386-linux-gnu/dri/intel-vaapi-driver
    version: *runtime-version
    versions: *runtime-version
    autodelete: false
    no-autodownload: true
    add-ld-path: lib
    download-if: have-intel-gpu
    autoprune-unless: have-intel-gpu

modules:
  - name: bundle-setup
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib/i386-linux-gnu
      - mkdir -p /app/lib/debug/lib/i386-linux-gnu
      - mkdir -p /app/lib/i386-linux-gnu/GL
      - mkdir -p /app/lib/i386-linux-gnu/dri/intel-vaapi-driver
      - install -Dm644 ld.so.conf /app/etc/ld.so.conf
    sources:
      - type: inline
        dest-filename: ld.so.conf
        contents: |
          /app/lib32
          /app/lib/i386-linux-gnu

  - name: vulkan-tools
    buildsystem: cmake-ninja
    config-opts:
      - -DGLSLANG_INSTALL_DIR=/app
      - -DVULKAN_HEADERS_INSTALL_DIR=/app
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/KhronosGroup/Vulkan-Tools/archive/v1.3.297/Vulkan-Tools-1.3.297.tar.gz
        sha256: 95bffa39d90f3ec81d8e3a0fa6c846ac1a10442152cc0b6d0d6567ce48932f89
    modules:
      - name: volk
        buildsystem: cmake-ninja
        config-opts:
          - -DVOLK_INSTALL=ON
        sources:
          - type: archive
            url: https://github.com/zeux/volk/archive/vulkan-sdk-1.3.296.0.tar.gz
            sha256: 8ffd0e81e29688f4abaa39e598937160b098228f37503903b10d481d4862ab85
        modules:
          - name: vulkan-headers
            buildsystem: cmake-ninja
            sources:
              - type: archive
                url: https://github.com/KhronosGroup/Vulkan-Headers/archive/v1.3.297/Vulkan-Headers-v1.3.297.tar.gz
                sha256: 1d679e2edc43cb7ad818b81dea960e374f1d6dd082325eb9b4c6113e76263c02

  - name: python3-dbus
    buildsystem: meson
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/dbus/dbus-python/-/archive/dbus-python-1.4.0/dbus-python-dbus-python-1.4.0.tar.gz
        sha256: da4ee9bbb9eb901d463a7cc9f99dfdbe6c751c8b48b29b78d378985a3c9656ad

  - name: faugus-launcher
    builddir: true
    buildsystem: meson
    build-options:
      config-opts:
        - -Dflatpak_build=true
    sources:
      - type: archive
        url: https://github.com/Faugus/faugus-launcher/archive/refs/tags/1.18.10.tar.gz
        sha256: 66c6d49d0936af774347d55608f0be08bdb2b6e87ecd882c5971bc86d6326dce

    modules:
      - name: imagemagick
        buildsystem: autotools
        config-opts:
          - --prefix=/app
          - --enable-shared
          - --disable-static
          - --disable-docs
        sources:
          - type: archive
            url: https://github.com/ImageMagick/ImageMagick/archive/refs/tags/7.1.2-16.tar.gz
            sha256: aadfa67a104d14a35339de0f2cc286c973a0f43329770c69e9667a22208750fb

      - modules/python3-Pillow.json
      - modules/python3-icoextract.json
      - modules/python3-requests.json
      - modules/python3-psutil.json
      - modules/python3-vdf.json
      - modules/python3-filelock.json
      - modules/python3-pygame.json

  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - shared-modules/libcanberra/libcanberra.json
